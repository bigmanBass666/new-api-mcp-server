# new-api-mcp-server CI pipeline
#
# Runs on every push and pull request to the main branch.
# Stages: unit tests → build → Docker image → E2E test

name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  GO_VERSION: "1.25"
  MCP_HTTP_AUTH_TOKEN: ci-test-token
  NEW_API_SYSTEM_KEY: ci-admin-token
  NEW_API_BASE_URL: http://new-api:3000

jobs:
  # ── Stage 1: Unit tests ──
  test:
    name: Unit Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}

      - name: Run tests with race detector
        run: go test ./... -v -race -count=1

      - name: Verify build
        run: go build -o /dev/null ./cmd/server

      - name: Static analysis
        run: go vet ./...

  # ── Stage 2: Docker build ──
  docker:
    name: Docker Build
    runs-on: ubuntu-latest
    needs: [test]
    steps:
      - uses: actions/checkout@v4

      - name: Build Docker image
        run: docker build -t new-api-mcp-server:${{ github.sha }} .

      - name: Verify image exists
        run: docker images new-api-mcp-server:${{ github.sha }} --format '{{.Repository}}:{{.Tag}}'

  # ── Stage 3: E2E test ──
  e2e:
    name: E2E Tests
    runs-on: ubuntu-latest
    needs: [docker]
    steps:
      - uses: actions/checkout@v4

      - name: Start Docker Compose stack
        run: |
          # Generate secrets for CI
          echo "SESSION_SECRET=ci-session-secret-1234567890" >> .env.ci
          echo "CRYPTO_SECRET=ci-crypto-secret-1234567890" >> .env.ci
          echo "NEW_API_SYSTEM_KEY=ci-admin-token" >> .env.ci
          echo "NEW_API_KEY=ci-relay-token" >> .env.ci
          echo "MCP_HTTP_AUTH_TOKEN=ci-test-token" >> .env.ci
          echo "MCP_LOG_LEVEL=info" >> .env.ci

          # Start services
          docker compose --env-file .env.ci up -d --wait --wait-timeout 120

      - name: Wait for MCP server ready
        run: |
          for i in $(seq 1 30); do
            if curl -sf http://localhost:4051/healthz > /dev/null 2>&1; then
              echo "MCP server ready"
              break
            fi
            echo "Waiting... ($i)"
            sleep 2
          done

      - name: Run E2E tests
        run: |
          pip install -q requests 2>/dev/null || true
          python3 scripts/test-e2e.py

      - name: Clean up
        if: always()
        run: docker compose down -v