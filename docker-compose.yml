# new-api-mcp-server Docker Compose
# Deploys New API + MCP server as a unified stack
#
# Usage:
#   cp .env.example .env   # configure your API keys
#   docker compose up -d    # start both services
#   claude mcp list         # verify MCP server connected

services:
  # ============================================================
  # New API — AI provider management panel
  # ============================================================
  new-api:
    image: calciumion/new-api:latest
    container_name: new-api
    restart: unless-stopped
    command: --log-dir /app/logs
    ports:
      - "4050:3000"
    volumes:
      - new-api-data:/data
    environment:
      - TZ=Asia/Shanghai
      - SESSION_SECRET=${SESSION_SECRET}
      - CRYPTO_SECRET=${CRYPTO_SECRET}
      - SQLITE_PATH=/data/newapi.db
      - ERROR_LOG_ENABLED=true
      - BATCH_UPDATE_ENABLED=true
      - STREAMING_TIMEOUT=300
      - CRITICAL_RATE_LIMIT_ENABLE=false
      - MEMORY_CACHE_ENABLED=true
      - SYNC_FREQUENCY=30
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3000/api/status"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s

  # ============================================================
  # new-api-mcp-server — MCP wrapper exposing New API as tools
  # ============================================================
  new-api-mcp:
    build: .
    container_name: new-api-mcp
    ports:
      - "4051:8080"
    environment:
      # Upstream New API — connect via Docker internal network
      - NEW_API_BASE_URL=http://new-api:3000

      # API keys — set in .env
      - NEW_API_SYSTEM_KEY=${NEW_API_SYSTEM_KEY}
      - NEW_API_KEY=${NEW_API_KEY}

      # Features
      - MCP_API_TOOLS_ENABLED=true
      - MCP_RELAY_ENABLED_GROUPS=${MCP_RELAY_ENABLED_GROUPS}

      # HTTP transport
      - MCP_TRANSPORT=http
      - MCP_HTTP_ADDR=:8080
      - MCP_HTTP_AUTH_TOKEN=${MCP_HTTP_AUTH_TOKEN}

      # Observability
      - MCP_LOG_LEVEL=${MCP_LOG_LEVEL:-info}
    depends_on:
      new-api:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8080/healthz"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 5s

volumes:
  new-api-data: